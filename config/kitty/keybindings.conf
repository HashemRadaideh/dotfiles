clear_all_shortcuts yes

kitty_mod ctrl+shift

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection
map shift+insert paste_from_selection

# Font size adjustment
map kitty_mod+equal  change_font_size all +0.5
map kitty_mod+plus   change_font_size all +0.5
map kitty_mod+minus  change_font_size all -0.5
map kitty_mod+0      change_font_size all 0

# Background opacity adjustment
map kitty_mod+o>m set_background_opacity +0.1
map kitty_mod+o>l set_background_opacity -0.1
map kitty_mod+o>1 set_background_opacity 1
map kitty_mod+o>d set_background_opacity default
