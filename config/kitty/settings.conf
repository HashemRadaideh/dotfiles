# Terminal type
term xterm-kitty

# Clipboard control (needed for paste to work properly)
clipboard_control write-clipboard write-primary

# URL detection and clicking
detect_urls yes
url_style curly

# Disable audio bell (visual bell still works)
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# Cursor appearance
cursor_shape block

# Performance tuning
repaint_delay 0
input_delay 0
sync_to_monitor no
scrollback_lines 0

# Shell integration (enables some useful features)
shell_integration enabled

# Font ligatures
disable_ligatures never

# Mouse behavior
mouse_hide_wait 3.0
copy_on_select no

# Selection behavior
strip_trailing_spaces never
select_by_word_characters @-./_~?&=%+#

allow_remote_control yes

allow_hyperlinks yes

rectangle_select_modifiers ctrl+alt

# window_title_format
