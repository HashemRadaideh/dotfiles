source = $HOME/.config/hypr/themes/frappe.hl

general {
    hide_cursor = true
}

background {
    path = /tmp/screenlock.png
    color = $crust
}

label {
    text = cmd[update:1000] echo "<b><big> $(date "+%H") </big></b>"
    color = $text
    font_size = 128
    font_family = Symbols Nerd Font Mono Regular
    position = 0, 0
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "<b><big> $(date "+%M") </big></b>"
    color = $text
    font_size = 128
    font_family = Symbols Nerd Font Mono Regular
    position = 0, -132
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "<b><big> $(date "+%A") </big></b>"
    color = $text
    font_size = 32
    font_family = Symbols Nerd Font Mono Regular
    position = 0, -240
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "<b><big> $(date "+%d %b") </big></b>"
    color = $text
    font_size = 32
    font_family = Symbols Nerd Font Mono Regular
    position = 0, -278
    halign = center
    valign = center
}

label {
    text = cmd[update:86400000] echo "<b><big> $(temperature) </big></b>"
    color = $text
    font_size = 48
    font_family = Symbols Nerd Font Mono Regular
    position = 16, 64
    halign = left
    valign = bottom
}

label {
    text = cmd[update:86400000] echo "<b><big> $(city) </big></b>"
    color = $text
    font_size = 32
    font_family = Symbols Nerd Font Mono Regular
    position = 16, 16
    halign = left
    valign = bottom
}

label {
    text = cmd[update:86400000] echo "<b><big> $(sky) </big></b>"
    color = $text
    font_size = 16
    font_family = Symbols Nerd Font Mono Regular
    position = -16, 80
    halign = right
    valign = bottom
}

label {
    text = cmd[update:86400000] echo "<b><big> Feels like $(feelslike) </big></b>"
    color = $text
    font_size = 16
    font_family = Symbols Nerd Font Mono Regular
    position = -16, 48
    halign = right
    valign = bottom
}

label {
    text = cmd[update:86400000] echo "<b><big> Humidity $(humidity) </big></b>"
    color = $text
    font_size = 16
    font_family = Symbols Nerd Font Mono Regular
    position = -16, 16
    halign = right
    valign = bottom
}

input-field {
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 1.00 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = $base
    inner_color = $base
    font_color = $text
    fade_on_empty = true
    placeholder_text = <i>Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    position = 0, 60
    halign = center
    valign = bottom
}
