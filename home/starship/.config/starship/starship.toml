"""

right_format = """\
$jobs\
"""

add_newline = true

scan_timeout = 500

palette = "catppuccin_frappe"

[username]
format = "[$user]($style)"
show_always = false
style_root = "bold blue"
style_user = "bold cyan"

[hostname]
format = "[@](bold white)[$hostname]($style) in "
ssh_only = true
style = "bold dimmed green"

[directory]
format = "[$read_only]($read_only_style)[$path]($style) "
style = "cyan"
read_only = "’ĆŻ "
read_only_style = "fg:dimmed white"
# truncation_length = 0
fish_style_pwd_dir_length = 1
truncate_to_repo = true
truncation_symbol = "repo: "

[sudo]
format = "as [$symbol]($style) "
allow_windows = true
style = "bold red"
symbol = "root"
disabled = false

[git_branch]
symbol = "’Éś "
truncation_symbol = "ŌĆ”"

[git_commit]
commit_hash_length = 4
only_detached = true

[git_state]
rebase = "rebasing"
merge = "merging"
revert = "reverting"
cherry_pick = "ŅŖø picking"
bisect = "bisecting"
am = "am'ing"
am_or_rebase = "am/rebase"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = false

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "bold red"
ahead = '[ŌćĪ $count ](bold cyan)'
behind = '[ŌćŻ $count ](bold cyan)'
diverged = '[(ŌćĪ $ahead_count ŌćĢ $behind_count ŌćŻ)](bold yellow)'
# up_to_date = '[Ō£ō ](bold green)'
conflicted = '[’Ćż $count ](bold red)'
untracked = '[’ōÆ $count ](yellow)'
stashed = '[’Ć£ $count ](dimmed white)'
modified = '[’æÖ $count ](yellow)'
staged = '[’æŚ $count ](bold green)'
renamed = '[Ņ½Ā $count ](bold blue)'
deleted = '[’æś $count ](bold red)'

typechanged = '[¾░ēó$count ](bold blue)'
worktree_added = '[¾░ÉĢ$count ](yellow)'
worktree_deleted = '[¾░ŹĘ$count ](yellow)'
worktree_modified = '[¾░Å½$count ](yellow)'
worktree_typechanged = '[¾░ēŻ$count ](yellow)'
index_added = '[¾░É¢$count ](bold green)'
index_deleted = '[¾░ŹČ$count ](bold red)'
index_modified = '[¾░║Ā$count ](bold green)'
index_typechanged = '[¾░ēż$count ](bold blue)'

[status]
format = '[$symbol$status ]($style)'
symbol = '’ĆŹ '                        # Ō£ś
style = 'bold red'
disabled = false

[character]
success_symbol = "[ŅŖģ](bold blue)"              # ŌØ» ’üö ŅŖģ
error_symbol = "[Ņē║](bold red)"
vimcmd_symbol = '[Ņś½](bold green)'              # ŌØ« ’üō Ņē║ 
vimcmd_replace_one_symbol = '[ŌØ«](bold purple)'
vimcmd_replace_symbol = '[ŌØ«](bold purple)'
vimcmd_visual_symbol = '[ŌØ«](bold yellow)'

[jobs]
format = '[$symbol$number ]($style)'
symbol = 'ŌÜÖ '
style = 'bold yellow'
number_threshold = 1
disabled = false

[profiles]
claude-code = "$claude_model$claude_context$claude_cost"

[claude_model]
format = "on [$symbol$model]($style) "
symbol = "­¤ż¢ "
style = "bold blue"

[claude_context]
format = "[$gauge $percentage]($style) "
gauge_width = 10

[claude_cost]
format = "[$symbol$cost]($style) "
symbol = "­¤Æ░ "

[claude_model.model_aliases]
"global.anthropic.claude-sonnet-4-5-20250929-v1:0" = "Sonnet 4.5"
"Claude Sonnet 4.5 (Vendor Proxy)" = "Sonnet"

