"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$username\
$hostname\
$directory\
$sudo\
(↓ Source control ↓)\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
(↑ Source control ↑)\
$time\
$cmd_duration\
$line_break\
$status\
$character\
"""

add_newline = true

scan_timeout = 500

palette = "catppuccin_frappe"

[username]
format = "[$user]($style)"
show_always = false
style_root = "bold blue"
style_user = "bold cyan"

[hostname]
format = "[@](bold white)[$hostname]($style) in "
ssh_only = true
style = "bold dimmed green"

[directory]
format = "[$read_only]($read_only_style)[$path]($style) "
style = "cyan"
read_only = " "
read_only_style = "fg:dimmed white"
truncation_length = 0

[sudo]
format = "as [$symbol]($style) "
allow_windows = true
style = "bold red"
symbol = "root"
disabled = false

[git_branch]
symbol = " "
truncation_symbol = "…"

[git_commit]
commit_hash_length = 4
only_detached = true

[git_state]
rebase = "rebasing"
merge = "merging"
revert = "reverting"
cherry_pick = " picking"
bisect = "bisecting"
am = "am'ing"
am_or_rebase = "am/rebase"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = false

[git_status]
format = '[$all_status$ahead_behind]($style)'
style = "bold red"
ahead = '[⇡ $count ](bold cyan)'
behind = '[⇣ $count ](bold cyan)'
diverged = '[(⇡ $ahead_count ⇕ $behind_count ⇣)](bold yellow)'
# up_to_date = '[✓ ](bold green)'
conflicted = '[ $count ](bold red)'
untracked = '[ $count ](yellow)'
stashed = '[ $count ](dimmed white)'
modified = '[ $count ](yellow)'
staged = '[ $count ](bold green)'
renamed = '[ $count ](bold blue)'
deleted = '[ $count ](bold red)'

typechanged = '[󰉢$count ](bold blue)'
worktree_added = '[󰐕$count ](yellow)'
worktree_deleted = '[󰍷$count ](yellow)'
worktree_modified = '[󰏫$count ](yellow)'
worktree_typechanged = '[󰉣$count ](yellow)'
index_added = '[󰐖$count ](bold green)'
index_deleted = '[󰍶$count ](bold red)'
index_modified = '[󰺠$count ](bold green)'
index_typechanged = '[󰉤$count ](bold blue)'

[time]
format = 'at [$time](bold green)'
time_format = "%I:%M %p "
disabled = false

[status]
format = '[$symbol$status ]($style)'
symbol = '✘ '
style = 'bold red'
disabled = false

[character]
success_symbol = "[](bold blue)"              # ❯   
error_symbol = "[](bold red)"
vimcmd_symbol = '[](bold green)'              # ❮   
vimcmd_replace_one_symbol = '[❮](bold purple)'
vimcmd_replace_symbol = '[❮](bold purple)'
vimcmd_visual_symbol = '[❮](bold yellow)'

