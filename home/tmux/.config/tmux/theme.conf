set -g status on
set -g status-interval 1
set -g status-position top
set -g status-justify left

left_sep=""
right_sep=""
cell_sep_left="Ōöé"
cell_sep_right="#[fg=$blue]Ōöé"

set -g pane-border-style "fg=$black"
set -g pane-active-border-style "fg=$black"

set -g display-panes-time 1000
set -g display-panes-colour "$red"
set -g display-panes-active-colour "$blue"

set -g message-style "fg=$white,bg=$black"

set -g mode-style "fg=$white,bg=$black4"

setw -g window-status-activity-style "fg=$gray,bg=$black"

set -g window-status-separator ""

set -g status-style        "fg=$white,bg=$black"
set -g status-left-length  100
set -g status-right-length 200

set -g status-left "\
#[fg=$black,bg=$blue] #S \
#[fg=$blue,bg=$black]$left_sep"

set -g window-status-format "\
#[fg=$black,bg=$black]$left_sep\
#[fg=$white,bg=$black] #I $cell_sep_left #W \
#[fg=$black,bg=$black]$left_sep"
# $cell_sep_left#[fg=$red,bg=$black]#[left-click='kill-window -t #I'] ├Ś \

set -g window-status-current-format "\
#[fg=$black,bg=$gray]$left_sep\
#[fg=$blue,bg=$gray] #I $cell_sep_left #W \
#[fg=$gray,bg=$black]$left_sep"
# $cell_sep_left#[fg=$red,bg=$gray]#[left-click='kill-window -t #I'] ├Ś \

set -g status-right "\
#{prefix_highlight}#[fg=$gray,bg=$black]$right_sep\
#[bg=$gray]\
#(~/.config/tmux/scripts/netio.sh)\
#(~/.config/tmux/scripts/disk.sh)\
#(~/.config/tmux/scripts/swap.sh)\
#(~/.config/tmux/scripts/mem.sh)\
#(~/.config/tmux/scripts/cpu.sh)\
#(~/.config/tmux/scripts/temp.sh)\
#(~/.config/tmux/scripts/battery.sh) #[fg=$blue,bg=$gray]$right_sep\
#[fg=$black,bg=$blue] ¾░źö %H:%M:%S "
#(~/.config/tmux/scripts/load.sh)\

set -g @prefix_highlight_output_prefix  "<"
set -g @prefix_highlight_output_suffix  "> "
set -g @prefix_highlight_fg             "$white"
set -g @prefix_highlight_bg             "$black"
set -g @prefix_highlight_show_copy_mode "on"
set -g @prefix_highlight_copy_mode_attr "fg=$white,bg=$black"

set -g @net_rx_color    "$green"
set -g @net_tx_color    "$red"
set -g @net_rx_icon     "Ōåō"
set -g @net_tx_icon     "Ōåæ"
set -g @net_wired       "$cyan"
set -g @net_wifi_high   "$cyan"
set -g @net_wifi_medium "$yellow"
set -g @net_wifi_low    "$red"
set -g @net_view_tmpl   "\
#[fg=$white] #{net.iface} #[fg=#{net.rx_color}]#{net.rx_icon}#{net.rx} #[fg=#{net.tx_color}]#{net.tx_icon}#{net.tx} "

set -g @disk_icon      "’āć" # ¾░Ź£
set -g @disk_low       "$green"
set -g @disk_medium    "$yellow"
set -g @disk_high      "$orange"
set -g @disk_stress    "$red"
set -g @disk_view_tmpl "\
$cell_sep_right#[fg=$white] #{disk.icon} #[fg=#{disk.color}]#{disk.pct}% "

set -g @swap_icon      "Ņē”"
set -g @swap_low       "$green"
set -g @swap_medium    "$yellow"
set -g @swap_stress    "$red"
set -g @swap_view_tmpl "\
$cell_sep_right#[fg=$white] #{swap.icon} #[fg=#{swap.color}]#{swap.pused} "

set -g @mem_icon      "Ņ┐ģ"
set -g @mem_low       "$green"
set -g @mem_medium    "$yellow"
set -g @mem_stress    "$red"
set -g @mem_view_tmpl "\
$cell_sep_right#[fg=$white] #{mem.icon} #[fg=#{mem.color}]#{mem.pused} "
#[fg=#{mem.color}]#{mem.used} #[fg=$white]/ #[fg=$orange]#{mem.total} #[fg=$white]=

set -g @cpu_icon      "¾░╗Ā"
set -g @cpu_low       "$green"
set -g @cpu_medium    "$yellow"
set -g @cpu_stress    "$red"
set -g @cpu_view_tmpl "\
$cell_sep_right#[fg=$white] #{cpu.icon} #[fg=#{cpu.color}]#{cpu.pused} "

# set -g @load_icon      "’Æ╝"
# set -g @load_low       "$green"
# set -g @load_medium    "$yellow"
# set -g @load_high      "$orange"
# set -g @load_stress    "$red"
# set -g @load_view_tmpl "\
# #[fg=$white] #{load.icon} #[fg=#{load.color}]#{load.val} $cell_sep_right"

set -g @temp_unit      "celsius" # celsius, fahrenheit, kelvin
set -g @temp_cel_icon  "¾░öä" # ┬░C
set -g @temp_feh_icon  "¾░öģ" # ┬░F
set -g @temp_kel_icon  "¾░öå" # K
set -g @temp_freezing  "$cyan"
set -g @temp_low       "$green"
set -g @temp_medium    "$yellow"
set -g @temp_high      "$orange"
set -g @temp_stress    "$red"
set -g @temp_view_tmpl "\
$cell_sep_right#[fg=#{temp.color}] #{temp.icon} #{temp.deg}#{temp.unit} "

set -g @bat_enabled   "auto"
set -g @bat_charging  "$orange"
set -g @bat_charged   "$cyan"
set -g @bat_high      "$green"
set -g @bat_med       "$yellow"
set -g @bat_low       "$red"
set -g @bat_view_tmpl "\
$cell_sep_right#[fg=#{bat.color}] #{bat.icon} #{bat.pct}%"

# vim: ft=tmux
